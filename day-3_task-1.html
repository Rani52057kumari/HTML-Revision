<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task-1</title>
</head>
<body>

    <h1>Student Registration From</h1>
    <form action="">
        <fieldset>
            <legend>Student Personal Details</legend><br>
            <label for="name">Name : </label>
            <input type="text" placeholder="Enter Student name">
            <br><br>

            <label for="email">Email : </label>
            <input type="email" placeholder="Enter Student Email">
            <br><br>

            <label for="password">Password : </label>
            <input type="password" placeholder="Enter Student Password">
            <br><br>

            <label for="tel">Number : </label>
            <input type="tel" placeholder="Enter Number">
            <br><br>

            <label for="address">Address : </label>
            <textarea></textarea>
            <br><br>

            <label>Course: </label>
            <select>
                <option>MERN Stack</option>
                <option>MEAN Stack</option>
            </select>
            <br><br>

            <label>Country : </label>
            <select>
                <option>India</option>
                <option>Korea</option>
            </select>
            <br><br>

            <label>City : </label>
            <select>
                <option>Delhi</option>
                <option>Seoul</option>
            </select>
            <br><br>

            <table border="2">
                <tr>
                    <td><button type="submit">Submit</button><br></td>
                    <td><button type="reset">Reset</button></td>
                </tr>
            </table>

        </fieldset>
    </form>

</body>
</html>
